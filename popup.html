<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Fill</title>
  </head>
  <body>
    <div class="container">
      <header>
        <span class="icon">⛶</span>
        <h1>Video Fill</h1>
      </header>

      <div id="error-msg" class="hidden"></div>

      <div id="controls" class="hidden">
        <div class="hostname" id="hostname"></div>
        <div class="mode-buttons">
          <button class="mode-btn" data-mode="off">Off</button>
          <button class="mode-btn" data-mode="fill">Fill</button>
          <button class="mode-btn" data-mode="fullscreen">Fullscreen</button>
        </div>
        <p class="hint" id="hint"></p>
      </div>
    </div>
    <script type="module" src="./src/popup.ts"></script>
  </body>
</html>
